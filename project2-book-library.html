<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biblios – Personal Book Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --card: #fffefb;
    --border: #e8e0d5;
    --accent: #c0622f;
    --accent2: #2f7ac0;
    --accent3: #2fa87a;
    --text: #1a1410;
    --muted: #7a6e65;
    --warm: #f5ede0;
    --shadow: rgba(100,70,30,0.12);
    --font-head: 'Playfair Display', serif;
    --font-body: 'Nunito', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  /* Background texture */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.4;
    background-image: radial-gradient(circle at 20% 50%, rgba(192,98,47,0.06) 0%, transparent 50%),
                      radial-gradient(circle at 80% 20%, rgba(47,122,192,0.05) 0%, transparent 40%);
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    box-shadow: 0 2px 20px var(--shadow);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo { display: flex; align-items: center; gap: 0.6rem; }
  .logo-icon { font-size: 1.8rem; }
  .logo-text { font-family: var(--font-head); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
  .logo-sub { font-size: 0.7rem; font-weight: 500; color: var(--muted); display: block; line-height: 1; margin-top: -2px; }
  .header-stats { display: flex; gap: 2rem; }
  .stat-chip {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--warm); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.4rem 0.9rem;
  }
  .stat-chip-val { font-family: var(--font-head); font-weight: 700; font-size: 1.1rem; color: var(--accent); }
  .stat-chip-lbl { font-size: 0.72rem; color: var(--muted); }

  /* LAYOUT */
  .app-layout { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
  .sidebar-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.25rem;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .sidebar-title {
    font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
    color: var(--accent); margin-bottom: 1rem; padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem;
  }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); font-size: 0.9rem; pointer-events: none; }
  .search-input {
    width: 100%; padding: 0.7rem 0.8rem 0.7rem 2.2rem;
    border: 1px solid var(--border); border-radius: 10px;
    font-family: var(--font-body); font-size: 0.875rem; background: var(--warm);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s; color: var(--text);
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,98,47,0.1); }
  .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .filter-btn {
    padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: var(--font-body);
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s; text-align: left;
    display: flex; align-items: center; justify-content: space-between;
  }
  .filter-btn:hover { background: var(--warm); color: var(--text); border-color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-count { font-size: 0.72rem; background: rgba(255,255,255,0.25); padding: 0.1rem 0.4rem; border-radius: 100px; }
  .filter-btn.active .filter-count { background: rgba(255,255,255,0.3); }
  .genre-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .genre-tag {
    padding: 0.3rem 0.7rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600;
    border: 1px solid var(--border); background: var(--warm); color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .genre-tag:hover, .genre-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .reading-progress { display: flex; flex-direction: column; gap: 0.75rem; }
  .rp-item { display: flex; align-items: center; gap: 0.75rem; }
  .rp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .rp-label { font-size: 0.8rem; color: var(--muted); flex: 1; }
  .rp-val { font-weight: 700; font-size: 0.85rem; font-family: var(--font-head); }

  /* MAIN */
  .main-area { display: flex; flex-direction: column; gap: 1.5rem; }
  .main-toolbar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .main-toolbar-title { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; }
  .main-toolbar-right { display: flex; gap: 0.75rem; align-items: center; }
  .sort-select {
    padding: 0.55rem 1rem; border: 1px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 0.85rem; background: var(--surface);
    outline: none; cursor: pointer; color: var(--text);
  }
  .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: 0.875rem; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #a8531f; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(192,98,47,0.3); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .view-btn { padding: 0.5rem 0.75rem; background: var(--surface); border: none; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
  .view-btn.active { background: var(--warm); }

  /* BOOKS GRID */
  .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 1.25rem; }
  .book-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.25s, box-shadow 0.25s; cursor: pointer;
  }
  .book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
  .book-cover {
    height: 180px; display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; position: relative; overflow: hidden;
  }
  .book-spine { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; }
  .book-body { padding: 0.9rem; }
  .book-title { font-family: var(--font-head); font-weight: 700; font-size: 0.85rem; margin-bottom: 0.25rem; line-height: 1.3; }
  .book-author { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .book-meta { display: flex; align-items: center; justify-content: space-between; }
  .book-status {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 0.2rem 0.5rem; border-radius: 4px;
  }
  .status-read { background: rgba(47,168,122,0.15); color: var(--accent3); }
  .status-reading { background: rgba(47,122,192,0.15); color: var(--accent2); }
  .status-want { background: rgba(192,98,47,0.15); color: var(--accent); }
  .status-borrowed { background: rgba(180,100,200,0.15); color: #9b59b6; }
  .book-rating { display: flex; gap: 1px; font-size: 0.7rem; }

  /* LIST VIEW */
  .books-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .book-row {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.9rem 1.25rem; display: flex; align-items: center; gap: 1.25rem;
    box-shadow: 0 1px 4px var(--shadow); transition: all 0.2s; cursor: pointer;
  }
  .book-row:hover { border-color: var(--accent); box-shadow: 0 4px 15px var(--shadow); }
  .book-row-emoji { font-size: 2rem; flex-shrink: 0; }
  .book-row-info { flex: 1; min-width: 0; }
  .book-row-title { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; }
  .book-row-meta { font-size: 0.8rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.2rem; }
  .book-row-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

  /* HISTORY */
  .history-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .history-item {
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem 1.25rem;
  }
  .history-emoji { font-size: 1.5rem; flex-shrink: 0; }
  .history-info { flex: 1; }
  .history-title { font-weight: 600; font-size: 0.9rem; }
  .history-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
  .history-date { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  /* ADD BOOK FORM */
  .add-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 12px var(--shadow);
    display: none;
  }
  .add-form.show { display: block; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .fg { display: flex; flex-direction: column; gap: 0.35rem; }
  .fg.full { grid-column: 1/-1; }
  label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea {
    border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.9rem;
    font-family: var(--font-body); font-size: 0.875rem; background: var(--warm);
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    z-index: 999; display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 2rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px var(--shadow); animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
  .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--muted); }
  .detail-cover { width: 100%; height: 160px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 4rem; margin-bottom: 1.25rem; }
  .detail-title { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
  .detail-author { color: var(--muted); margin-bottom: 1rem; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .detail-tag { padding: 0.3rem 0.8rem; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
  .borrow-form { background: var(--warm); border-radius: 10px; padding: 1rem; margin-top: 1rem; }
  .borrow-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.75rem; color: var(--accent); }

  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; background: var(--accent); color: #fff; padding: 0.9rem 1.25rem; border-radius: 10px; font-weight: 600; font-size: 0.875rem; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(192,98,47,0.4); }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) {
    .app-layout { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .form-row { grid-template-columns: 1fr; }
    .books-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- BOOK DETAIL MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <div>
        <span class="logo-text">Biblios</span>
        <span class="logo-sub">Your Personal Library</span>
      </div>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </div>
</header>

<!-- LAYOUT -->
<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">🔍 Search</div>
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search books or authors..." oninput="filterBooks()"/>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-title">📂 Shelves</div>
      <div class="filter-group" id="shelfFilters">
        <button class="filter-btn active" onclick="setFilter('all',this)">All Books <span class="filter-count" id="cnt-all">0</span></button>
        <button class="filter-btn" onclick="setFilter('reading',this)">📖 Currently Reading <span class="filter-count" id="cnt-reading">0</span></button>
        <button class="filter-btn" onclick="setFilter('read',this)">✅ Read <span class="filter-count" id="cnt-read">0</span></button>
        <button class="filter-btn" onclick="setFilter('want',this)">🔖 Want to Read <span class="filter-count" id="cnt-want">0</span></button>
        <button class="filter-btn" onclick="setFilter('borrowed',this)">🤝 Borrowed Out <span class="filter-count" id="cnt-borrowed">0</span></button>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-title">🏷️ Genres</div>
      <div class="genre-wrap" id="genreFilters"></div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-title">📊 Stats</div>
      <div class="reading-progress">
        <div class="rp-item"><div class="rp-dot" style="background:var(--accent3)"></div><span class="rp-label">Pages Read</span><span class="rp-val" id="pagesRead">0</span></div>
        <div class="rp-item"><div class="rp-dot" style="background:var(--accent2)"></div><span class="rp-label">Avg Rating</span><span class="rp-val" id="avgRating">–</span></div>
        <div class="rp-item"><div class="rp-dot" style="background:var(--accent)"></div><span class="rp-label">Genres</span><span class="rp-val" id="genreCount">0</span></div>
        <div class="rp-item"><div class="rp-dot" style="background:#9b59b6"></div><span class="rp-label">Borrowed</span><span class="rp-val" id="borrowedCount">0</span></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-area">
    <div class="main-toolbar">
      <div class="main-toolbar-title" id="mainTitle">All Books</div>
      <div class="main-toolbar-right">
        <select class="sort-select" id="sortSelect" onchange="renderBooks()">
          <option value="title">Sort: Title</option>
          <option value="author">Sort: Author</option>
          <option value="rating">Sort: Rating</option>
          <option value="year">Sort: Year</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')">⊞</button>
          <button class="view-btn" id="listBtn" onclick="setView('list')">≡</button>
        </div>
        <button class="btn btn-primary" onclick="toggleAddForm()">+ Add Book</button>
      </div>
    </div>

    <!-- ADD BOOK FORM -->
    <div class="add-form" id="addForm">
      <div style="font-family:var(--font-head);font-size:1.1rem;font-weight:700;margin-bottom:1rem;color:var(--accent);">📖 Add New Book</div>
      <div class="form-row">
        <div class="fg"><label>Title *</label><input type="text" id="newTitle" placeholder="Book title"/></div>
        <div class="fg"><label>Author *</label><input type="text" id="newAuthor" placeholder="Author name"/></div>
        <div class="fg"><label>Genre *</label>
          <select id="newGenre">
            <option value="">Select genre</option>
            <option>Fiction</option><option>Non-Fiction</option><option>Science Fiction</option>
            <option>Fantasy</option><option>Mystery</option><option>Biography</option>
            <option>History</option><option>Self-Help</option><option>Romance</option><option>Thriller</option>
          </select>
        </div>
        <div class="fg"><label>Status</label>
          <select id="newStatus">
            <option value="want">Want to Read</option>
            <option value="reading">Currently Reading</option>
            <option value="read">Read</option>
          </select>
        </div>
        <div class="fg"><label>Year</label><input type="number" id="newYear" placeholder="2024"/></div>
        <div class="fg"><label>Pages</label><input type="number" id="newPages" placeholder="300"/></div>
        <div class="fg"><label>Rating (1-5)</label><input type="number" id="newRating" min="1" max="5" placeholder="4"/></div>
        <div class="fg"><label>ISBN</label><input type="text" id="newISBN" placeholder="978-..."/></div>
        <div class="fg full"><label>Notes</label><input type="text" id="newNotes" placeholder="Personal notes about this book..."/></div>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1rem;">
        <button class="btn btn-primary" onclick="addBook()">Save Book</button>
        <button class="btn btn-outline" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>

    <!-- BOOKS DISPLAY -->
    <div id="booksContainer"></div>

    <!-- BORROW HISTORY -->
    <div>
      <div style="font-family:var(--font-head);font-size:1.1rem;font-weight:700;margin-bottom:1rem;">📋 Borrowing History</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </main>
</div>

<script>
let books = [
  { id:1, emoji:'🌌', color:'#1a1a3a', spine:'#4a4aaa', title:'Dune', author:'Frank Herbert', genre:'Science Fiction', status:'read', year:1965, pages:412, rating:5, notes:'Masterpiece of world-building', isbn:'978-0441013593', borrowedTo:null },
  { id:2, emoji:'🧙', color:'#1a2a1a', spine:'#4a8a4a', title:'The Hobbit', author:'J.R.R. Tolkien', genre:'Fantasy', status:'read', year:1937, pages:310, rating:5, notes:'A timeless adventure', isbn:'978-0547928227', borrowedTo:null },
  { id:3, emoji:'🕵️', color:'#2a1a1a', spine:'#8a4a4a', title:'Gone Girl', author:'Gillian Flynn', genre:'Thriller', status:'reading', year:2012, pages:422, rating:4, notes:'Gripping from start to finish', isbn:'978-0307588371', borrowedTo:null },
  { id:4, emoji:'🧬', color:'#1a2a2a', spine:'#4a8a8a', title:'The Gene', author:'Siddhartha Mukherjee', genre:'Non-Fiction', status:'want', year:2016, pages:608, rating:0, notes:'', isbn:'978-1476733500', borrowedTo:null },
  { id:5, emoji:'🦁', color:'#2a2a1a', spine:'#8a8a4a', title:'Educated', author:'Tara Westover', genre:'Biography', status:'read', year:2018, pages:334, rating:5, notes:'Deeply moving memoir', isbn:'978-0399590504', borrowedTo:null },
  { id:6, emoji:'🐉', color:'#2a1a2a', spine:'#8a4a8a', title:'A Game of Thrones', author:'G.R.R. Martin', genre:'Fantasy', status:'borrowed', year:1996, pages:694, rating:4, notes:'Loaned to Sarah', isbn:'978-0553593716', borrowedTo:'Sarah Johnson' },
  { id:7, emoji:'⚡', color:'#1a1a2a', spine:'#5a5aaa', title:'Atomic Habits', author:'James Clear', genre:'Self-Help', status:'read', year:2018, pages:320, rating:4, notes:'Changed my daily routine', isbn:'978-0735211292', borrowedTo:null },
  { id:8, emoji:'🌊', color:'#1a2030', spine:'#3a6090', title:'The Old Man and the Sea', author:'Ernest Hemingway', genre:'Fiction', status:'read', year:1952, pages:127, rating:4, notes:'Short but profound', isbn:'978-0684801223', borrowedTo:null },
  { id:9, emoji:'🔮', color:'#20102a', spine:'#804090', title:'Sapiens', author:'Yuval Noah Harari', genre:'History', status:'reading', year:2011, pages:443, rating:5, notes:'Fascinating perspective', isbn:'978-0062316097', borrowedTo:null },
  { id:10, emoji:'🌹', color:'#2a1015', spine:'#902040', title:'Pride and Prejudice', author:'Jane Austen', genre:'Romance', status:'want', year:1813, pages:279, rating:0, notes:'Classic on the bucket list', isbn:'978-0141439518', borrowedTo:null },
];

let borrowHistory = [
  { emoji:'🐉', title:'A Game of Thrones', person:'Sarah Johnson', date:'2024-01-15', status:'out' },
  { emoji:'⚡', title:'Atomic Habits', person:'Mike Chen', date:'2023-12-10', status:'returned', returnDate:'2024-01-05' },
  { emoji:'🧙', title:'The Hobbit', person:'Emma Davis', date:'2023-11-20', status:'returned', returnDate:'2023-12-15' },
];

let currentFilter = 'all';
let currentView = 'grid';
let currentGenre = 'all';
let searchQ = '';
let nextId = 11;

const emojis = ['📗','📘','📙','📕','📒','📔','📓'];

function getFiltered() {
  let list = [...books];
  if (currentFilter !== 'all') list = list.filter(b=>b.status===currentFilter);
  if (currentGenre !== 'all') list = list.filter(b=>b.genre===currentGenre);
  if (searchQ) list = list.filter(b=> b.title.toLowerCase().includes(searchQ) || b.author.toLowerCase().includes(searchQ));
  const sort = document.getElementById('sortSelect').value;
  list.sort((a,b)=> {
    if (sort==='title') return a.title.localeCompare(b.title);
    if (sort==='author') return a.author.localeCompare(b.author);
    if (sort==='rating') return b.rating - a.rating;
    if (sort==='year') return b.year - a.year;
    return 0;
  });
  return list;
}

function stars(n) {
  if (!n) return '<span style="color:var(--muted)">Not rated</span>';
  return '★'.repeat(n)+'☆'.repeat(5-n);
}

function renderBooks() {
  const list = getFiltered();
  const container = document.getElementById('booksContainer');
  const titles = {'all':'All Books','reading':'Currently Reading','read':'Read','want':'Want to Read','borrowed':'Borrowed Out'};
  document.getElementById('mainTitle').textContent = (currentGenre!=='all' ? currentGenre+' · ' : '') + (titles[currentFilter]||'Books') + ` (${list.length})`;

  if (currentView === 'grid') {
    container.innerHTML = `<div class="books-grid">${list.map(b=>`
      <div class="book-card" onclick="openBook(${b.id})">
        <div class="book-cover" style="background:${b.color}">
          <div class="book-spine" style="background:${b.spine}"></div>
          ${b.emoji}
        </div>
        <div class="book-body">
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
          <div class="book-meta">
            <span class="book-status status-${b.status}">${{read:'Read',reading:'Reading',want:'Want',borrowed:'Borrowed'}[b.status]}</span>
            <div class="book-rating" style="color:#f39c12">${b.rating ? '★'.repeat(b.rating) : ''}</div>
          </div>
        </div>
      </div>`).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="books-list">${list.map(b=>`
      <div class="book-row" onclick="openBook(${b.id})">
        <div class="book-row-emoji">${b.emoji}</div>
        <div class="book-row-info">
          <div class="book-row-title">${b.title}</div>
          <div class="book-row-meta">
            <span>${b.author}</span>
            <span>${b.genre}</span>
            <span>${b.year}</span>
            ${b.pages ? `<span>${b.pages} pages</span>` : ''}
            ${b.borrowedTo ? `<span style="color:#9b59b6">→ ${b.borrowedTo}</span>` : ''}
          </div>
        </div>
        <span class="book-status status-${b.status}">${{read:'Read',reading:'Reading',want:'Want',borrowed:'Borrowed'}[b.status]}</span>
        <div style="color:#f39c12;font-size:0.8rem;">${b.rating ? '★'.repeat(b.rating) : '–'}</div>
      </div>`).join('')}</div>`;
  }

  updateStats();
}

function updateStats() {
  const cnt = s => books.filter(b=>b.status===s).length;
  document.getElementById('cnt-all').textContent = books.length;
  document.getElementById('cnt-reading').textContent = cnt('reading');
  document.getElementById('cnt-read').textContent = cnt('read');
  document.getElementById('cnt-want').textContent = cnt('want');
  document.getElementById('cnt-borrowed').textContent = cnt('borrowed');
  // Stats sidebar
  const rated = books.filter(b=>b.rating>0);
  document.getElementById('pagesRead').textContent = books.filter(b=>b.status==='read').reduce((s,b)=>s+(b.pages||0),0).toLocaleString();
  document.getElementById('avgRating').textContent = rated.length ? (rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1)+'★' : '–';
  document.getElementById('genreCount').textContent = new Set(books.map(b=>b.genre)).size;
  document.getElementById('borrowedCount').textContent = cnt('borrowed');
  // Header stats
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-chip"><div><div class="stat-chip-val">${books.length}</div><div class="stat-chip-lbl">Books</div></div></div>
    <div class="stat-chip"><div><div class="stat-chip-val">${cnt('read')}</div><div class="stat-chip-lbl">Read</div></div></div>
    <div class="stat-chip"><div><div class="stat-chip-val">${cnt('reading')}</div><div class="stat-chip-lbl">Reading</div></div></div>`;
  // Genres
  const genres = [...new Set(books.map(b=>b.genre))].sort();
  document.getElementById('genreFilters').innerHTML = `<span class="genre-tag ${currentGenre==='all'?'active':''}" onclick="setGenre('all',this)">All</span>` +
    genres.map(g=>`<span class="genre-tag ${currentGenre===g?'active':''}" onclick="setGenre('${g}',this)">${g}</span>`).join('');
}

function openBook(id) {
  const b = books.find(x=>x.id===id);
  if (!b) return;
  document.getElementById('modalContent').innerHTML = `
    <div class="detail-cover" style="background:${b.color}">${b.emoji}</div>
    <div class="detail-title">${b.title}</div>
    <div class="detail-author" style="font-style:italic">${b.author} · ${b.year}</div>
    <div class="detail-tags">
      <span class="detail-tag" style="background:rgba(192,98,47,0.1);color:var(--accent)">${b.genre}</span>
      <span class="book-status status-${b.status}" class="detail-tag">${{read:'✅ Read',reading:'📖 Reading',want:'🔖 Want to Read',borrowed:'🤝 Borrowed Out'}[b.status]}</span>
      ${b.pages ? `<span class="detail-tag" style="background:var(--warm);color:var(--muted)">${b.pages} pages</span>` : ''}
      ${b.isbn ? `<span class="detail-tag" style="background:var(--warm);color:var(--muted);font-size:0.7rem">${b.isbn}</span>` : ''}
    </div>
    <div style="display:flex;gap:0.5rem;font-size:1.2rem;color:#f39c12;margin-bottom:1rem;">${b.rating ? '★'.repeat(b.rating)+'<span style=color:var(--border)>'+'★'.repeat(5-b.rating)+'</span>' : '<span style=color:var(--muted);font-size:0.85rem>Not yet rated</span>'}</div>
    ${b.notes ? `<div style="background:var(--warm);border-radius:8px;padding:0.75rem;font-size:0.85rem;color:var(--muted);margin-bottom:1rem;"><em>"${b.notes}"</em></div>` : ''}
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">
      <button class="btn btn-outline" style="font-size:0.8rem;" onclick="changeStatus(${b.id},'read')">✅ Mark Read</button>
      <button class="btn btn-outline" style="font-size:0.8rem;" onclick="changeStatus(${b.id},'reading')">📖 Reading</button>
      <button class="btn btn-outline" style="font-size:0.8rem;" onclick="changeStatus(${b.id},'want')">🔖 Wishlist</button>
      <button class="btn btn-outline" style="font-size:0.8rem;color:var(--accent3);" onclick="removeBook(${b.id})">🗑 Remove</button>
    </div>
    <div class="borrow-form">
      <div class="borrow-title">📤 Lend This Book</div>
      <div style="display:flex;gap:0.5rem;">
        <input type="text" id="borrowName" placeholder="Borrower's name..." style="flex:1"/>
        <button class="btn btn-primary" style="font-size:0.8rem;" onclick="lendBook(${b.id})">Lend</button>
      </div>
      ${b.borrowedTo ? `<div style="margin-top:0.5rem;font-size:0.8rem;color:#9b59b6">Currently with: <strong>${b.borrowedTo}</strong> · <span style="cursor:pointer;text-decoration:underline" onclick="returnBook(${b.id})">Mark Returned</span></div>` : ''}
    </div>`;
  document.getElementById('modal').classList.add('show');
}

function changeStatus(id, status) {
  const b = books.find(x=>x.id===id);
  if (b) { b.status = status; renderBooks(); renderHistory(); toast(`"${b.title}" moved to ${status}`); closeModal(); }
}

function removeBook(id) {
  const b = books.find(x=>x.id===id);
  if (b && confirm(`Remove "${b.title}" from your library?`)) {
    books = books.filter(x=>x.id!==id);
    renderBooks(); renderHistory(); toast(`"${b.title}" removed`); closeModal();
  }
}

function lendBook(id) {
  const name = document.getElementById('borrowName').value.trim();
  if (!name) { alert('Enter borrower name!'); return; }
  const b = books.find(x=>x.id===id);
  b.status='borrowed'; b.borrowedTo=name;
  borrowHistory.unshift({ emoji:b.emoji, title:b.title, person:name, date:new Date().toISOString().slice(0,10), status:'out' });
  renderBooks(); renderHistory(); toast(`"${b.title}" lent to ${name}`); closeModal();
}

function returnBook(id) {
  const b = books.find(x=>x.id===id);
  if (b) {
    const h = borrowHistory.find(x=>x.title===b.title&&x.status==='out');
    if (h) { h.status='returned'; h.returnDate=new Date().toISOString().slice(0,10); }
    b.status='read'; b.borrowedTo=null;
    renderBooks(); renderHistory(); toast(`"${b.title}" returned!`); closeModal();
  }
}

function renderHistory() {
  document.getElementById('historyList').innerHTML = borrowHistory.map(h=>`
    <div class="history-item">
      <span class="history-emoji">${h.emoji}</span>
      <div class="history-info">
        <div class="history-title">${h.title}</div>
        <div class="history-sub">${h.status==='out' ? `📤 Lent to <strong>${h.person}</strong>` : `✅ Returned by <strong>${h.person}</strong> on ${h.returnDate}`}</div>
      </div>
      <span class="history-date">${h.date}</span>
    </div>`).join('');
}

function addBook() {
  const title = document.getElementById('newTitle').value.trim();
  const author = document.getElementById('newAuthor').value.trim();
  const genre = document.getElementById('newGenre').value;
  if (!title || !author || !genre) { alert('Title, author, and genre are required!'); return; }
  const colors = ['#1a1a3a','#1a2a1a','#2a1a1a','#1a2a2a','#2a2a1a','#2a1a2a','#1a1a2a'];
  const spines = ['#4a4aaa','#4a8a4a','#8a4a4a','#4a8a8a','#8a8a4a','#8a4a8a','#5a5aaa'];
  const ci = Math.floor(Math.random()*colors.length);
  books.unshift({
    id: nextId++,
    emoji: emojis[Math.floor(Math.random()*emojis.length)],
    color: colors[ci], spine: spines[ci],
    title, author, genre,
    status: document.getElementById('newStatus').value,
    year: parseInt(document.getElementById('newYear').value)||new Date().getFullYear(),
    pages: parseInt(document.getElementById('newPages').value)||0,
    rating: parseInt(document.getElementById('newRating').value)||0,
    notes: document.getElementById('newNotes').value,
    isbn: document.getElementById('newISBN').value,
    borrowedTo: null
  });
  toggleAddForm();
  renderBooks(); renderHistory();
  toast(`"${title}" added to your library!`);
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('show');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBooks();
}

function setGenre(g, el) {
  currentGenre = g;
  document.querySelectorAll('.genre-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderBooks();
}

function setView(v) {
  currentView = v;
  document.getElementById('gridBtn').classList.toggle('active', v==='grid');
  document.getElementById('listBtn').classList.toggle('active', v==='list');
  renderBooks();
}

function filterBooks() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  renderBooks();
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '📚 '+msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

renderBooks();
renderHistory();
</script>
</body>
</html>
